{% extends "base.html" %}
{% block xdata %} x-data="word"{% endblock %}
{% block title %}Conlexa{% endblock %}
{% block subtitle %}Dictionary{% endblock %}
{% block content %}
<div class="layout">
  <aside>
    <button class="reset-btn" @click="goBack">← Back</button>
    <button class="reset-btn" @click="startEdit" x-show="viewMode && !isLoading">Edit</button>
    <button class="reset-btn" @click="deleteWord" x-show="viewMode && !isLoading">Delete</button>
  </aside>

  <main id="content">
    <!-- Loading state -->
    <div class="loading" x-show="isLoading">Loading</div>

    <!-- Error state -->
    <div class="empty" x-show="!isLoading && error" x-text="error"></div>

    <!-- View mode -->
    <template x-if="!isLoading && !error && viewMode && wordData">
      <div>
        <div class="word-header">
          <div class="word-heading-row">
            <h2 class="word-heading" x-text="wordData.word"></h2>
            <span id="ipa-result" x-text="ipaResult ? '/' + ipaResult + '/' : ''"></span>
            <template x-if="wordData.language_code">
              <span class="lang-badge" x-text="wordData.language_code"></span>
            </template>
            <template x-if="wordData.pos">
              <div>
                <span class="pos-badge" x-text="wordData.pos"></span>
                <template x-if="wordData.class">
                  <span class="etymology" x-text="' ' + wordData.class"></span>
                </template>
              </div>
            </template>
          </div>
        </div>

        <template x-if="wordData.def_en">
          <div class="section-block">
            <div class="section-label">Definition</div>
            <div class="definition" style="font-size:1rem;max-width:none" x-text="wordData.def_en"></div>
          </div>
        </template>

        <template x-if="wordData.etymology">
          <div class="section-block">
            <div class="section-label">Etymology</div>
            <div class="etymology" style="font-size:14px" x-text="wordData.etymology"></div>
          </div>
        </template>

        <template x-if="wordData.tags && wordData.tags.length > 0">
          <div class="section-block">
            <div class="section-label">Tags</div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
              <template x-for="tag in wordData.tags" :key="tag">
                <span class="lang-badge" x-text="tag"></span>
              </template>
            </div>
          </div>
        </template>

        <template x-if="wordData.example">
          <div>
            <div class="section-label">Example</div>
            <div style="font-size:14px;font-style:italic;color:var(--text-dim)" x-text="wordData.example"></div>
          </div>
        </template>

        <template x-if="grammarTables.length > 0">
          <div class="section-block">
            <div class="section-label">Grammar Tables</div>
            <div style="display:flex;flex-direction:column;gap:1rem">
              <template x-for="table in grammarTables" :key="table.id">
                <div class="table-view">
                  <div style="font-weight:bold;margin-bottom:0.5rem" x-text="table.title"></div>
                  <div style="overflow:auto">
                    <table class="grammar-table">
                      <thead>
                        <tr>
                          <th></th>
                          <template x-for="col in table.col_order" :key="col">
                            <th x-text="col"></th>
                          </template>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="row in table.row_order" :key="row">
                          <tr>
                            <td style="font-weight:bold" x-text="row"></td>
                            <template x-for="col in table.col_order" :key="col">
                              <td x-text="table.data[row][col]"></td>
                            </template>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Edit mode -->
    <template x-if="!isLoading && !error && !viewMode">
      <form @submit.prevent="saveWord">
        <div class="filter-group">
          <label>Word</label>
          <input name="word" class="edit-field" type="text" x-model="editForm.word" required>
        </div>
        <div class="filter-group">
          <label>Native Script</label>
          <input name="word_scripted" class="edit-field" type="text" x-model="editForm.word_scripted">
        </div>
        <div class="filter-group">
          <label>Part of Speech</label>
          <select name="pos" class="edit-field" x-model="editForm.pos">
            <option value="">—</option>
            <template x-for="pos in editPartsOfSpeech" :key="pos">
              <option :value="pos" x-text="pos"></option>
            </template>
          </select>
        </div>
        <div class="filter-group">
          <label>Class</label>
          <input name="class" class="edit-field" type="text" x-model="editForm.class">
        </div>
        <div class="filter-group">
          <label>Language Code</label>
          <select name="language_code" class="edit-field" x-model="editForm.language_code" @change="onEditLanguageChange">
            <option value="">—</option>
            <template x-for="lang in languageCodes" :key="lang">
              <option :value="lang" x-text="lang"></option>
            </template>
          </select>
        </div>
        <div class="filter-group">
          <label>Definition</label>
          <textarea name="def_en" class="edit-field" rows="4" x-model="editForm.def_en"></textarea>
        </div>
        <div class="filter-group">
          <label>Etymology</label>
          <textarea name="etymology" class="edit-field" rows="3" x-model="editForm.etymology"></textarea>
        </div>
        <div class="filter-group">
          <label>Example</label>
          <textarea name="example" class="edit-field" rows="2" x-model="editForm.example"></textarea>
        </div>
        <div class="filter-group">
          <label>Tags (comma-separated)</label>
          <input name="tags" class="edit-field" type="text" x-model="editForm.tagsRaw">
        </div>
        <div class="form-actions">
          <button type="submit" class="reset-btn reset-btn-accent" :disabled="isSaving" x-text="isSaving ? 'Saving…' : 'Save'"></button>
          <button type="button" class="reset-btn" @click="cancelEdit">Cancel</button>
        </div>
      </form>
    </template>
  </main>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('word', () => ({
    // State
    isLoading: true,
    error: '',
    wordData: null,
    viewMode: true,
    ipaResult: '',
    grammarTables: [],

    // Edit mode state
    languageCodes: [],
    editPartsOfSpeech: [],
    isSaving: false,

    // Edit form data
    editForm: {
      word: '',
      word_scripted: '',
      pos: '',
      class: '',
      language_code: '',
      def_en: '',
      etymology: '',
      example: '',
      tagsRaw: '',
    },

    // Lifecycle
    async init() {
      const id = window.location.pathname.split('/').pop();
      this.id = id;
      await this.loadFilters();
      await this.loadWord();
    },

    // Methods
    async loadFilters() {
      try {
        const data = await fetchFilters();
        this.languageCodes = data.language_codes || [];
      } catch (error) {
        console.error('Failed to load filters:', error);
      }
    },

    async loadWord() {
      this.isLoading = true;
      this.error = '';
      try {
        const w = await fetchWord(this.id);
        this.wordData = w;
        document.title = `Word: ${w.word} ⋄ Conlexa`;

        if (w.grammar_tables && w.grammar_tables.length > 0) {
          console.log("Matched grammar tables: ", w.grammar_tables);
          this.grammarTables = w.grammar_tables;
        }

        // Load IPA if language code exists
        if (w.language_code) {
          await this.loadIPA(w.word, w.language_code);
        }
      } catch (error) {
        console.error('Failed to load word:', error);
        this.error = 'Word not found.';
      } finally {
        this.isLoading = false;
      }
    },

    async loadIPA(word, lang_code) {
      try {
        const result = await applyPhonology(word, lang_code);
        this.ipaResult = result;
      } catch (error) {
        console.log("Failed to load IPA: ", error);
      }
    },

    async deleteWord() {
      if (!this.wordData) return;

      if (!confirm(`Delete "${this.wordData.word}"? This cannot be undone.`)) return;

      try {
        await deleteWord(this.id);
        window.location.href = '/dictionary';
      } catch (error) {
        alert('Delete failed. Please try again.');
      }
    },

    async startEdit() {
      if (!this.wordData) return;

      // Populate edit form with current data
      this.editForm = {
        word: this.wordData.word || '',
        word_scripted: this.wordData.word_scripted || '',
        pos: this.wordData.pos || '',
        class: this.wordData.class || '',
        language_code: this.wordData.language_code || '',
        def_en: this.wordData.def_en || '',
        etymology: this.wordData.etymology || '',
        example: this.wordData.example || '',
        tagsRaw: (this.wordData.tags || []).join(', '),
      };

      // Load parts of speech for current language
      if (this.wordData.language_code) {
        await this.loadPartsOfSpeech(this.wordData.language_code);
      }

      this.viewMode = false;
    },

    async loadPartsOfSpeech(langCode) {
      if (!langCode) {
        this.editPartsOfSpeech = [];
        return;
      }

      try {
        const partsOfSpeech = await fetchPartsOfSpeech(langCode);
        this.editPartsOfSpeech = partsOfSpeech.map(pos => pos.code);
      } catch (error) {
        console.error('Failed to load parts of speech:', error);
        this.editPartsOfSpeech = [];
      }
    },

    async onEditLanguageChange() {
      await this.loadPartsOfSpeech(this.editForm.language_code);
    },

    async saveWord() {
      if (this.isSaving) return;

      this.isSaving = true;

      try {
        const tags = this.editForm.tagsRaw.trim()
          ? this.editForm.tagsRaw.split(',').map(t => t.trim()).filter(Boolean)
          : null;

        const body = {
          word: this.editForm.word.trim(),
          word_scripted: this.editForm.word_scripted.trim() || null,
          def_en: this.editForm.def_en.trim() || null,
          pos: this.editForm.pos.trim() || null,
          class: this.editForm.class.trim() || null,
          language_code: this.editForm.language_code.trim() || null,
          etymology: this.editForm.etymology.trim() || null,
          example: this.editForm.example.trim() || null,
          tags: tags,
        };

        await updateWord(this.id, body);

        // Reload word data and switch back to view mode
        await this.loadWord();
        this.viewMode = true;
      } catch (error) {
        console.error('Save failed:', error);
        alert('Save failed. Please try again.');
      } finally {
        this.isSaving = false;
      }
    },

    cancelEdit() {
      this.viewMode = true;
    },

    goBack() {
      window.location.href = '/dictionary';
    }
  }));
});
</script>
{% endblock %}
