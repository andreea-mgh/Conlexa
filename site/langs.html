<!DOCTYPE html>
<html lang="en" x-data="languages">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Languages ⋄ Conlexa</title>
<link rel="stylesheet" href="/style.css"/>
<script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
</head>
<body>

<header>
  <h1><a href="/" class="entry-link">Conlexa</a></h1>
  <span class="subtitle" x-text="pageTitle">Languages</span>
</header>

<div class="layout">
  <aside>
    <button class="reset-btn" @click="goBack">← Back</button>
  </aside>

  <main id="main" class="main-flex">
    <!-- Loading state -->
    <div class="loading" x-show="isLoading">Loading</div>
    
    <!-- Error state -->
    <div class="empty" x-show="!isLoading && error" x-text="error"></div>
    
    <!-- List view -->
    <template x-if="!isLoading && !error && !selectedLanguage">
      <div>
        <template x-for="lang in languages" :key="lang.code">
          <h3 class="page-link" @click="selectLanguage(lang.code)" style="cursor: pointer;">
            <span class="lang-badge" x-text="lang.code"></span>
            <span x-text="lang.name_en"></span>
          </h3>
        </template>
        <div class="empty" x-show="languages.length === 0">No languages found.</div>
      </div>
    </template>
    
    <!-- Detail view -->
    <template x-if="!isLoading && !error && selectedLanguage">
      <div>
        <div class="word-header">
          <div class="word-heading-row">
            <h2 class="word-heading" x-text="selectedLanguage.name_en"></h2>
            <span class="lang-badge" x-text="selectedLanguage.code"></span>
          </div>
        </div>
        <div class="word-detail">
          <h2>Grammar</h2>
          <div class="section-block">
            <div class="section-label">Parts of Speech</div>
            <ul class="list-block">
              <template x-for="pos in selectedLanguage.parts_of_speech" :key="pos.code">
                <li>
                  <span class="pos-badge" x-text="pos.code"></span>
                  <span class="pos-name" x-text="pos.name_en"></span>
                  <button class="delete-button" @click="deletePartOfSpeech(pos.code)">delete</button>
                </li>
              </template>
            </ul>
            <div class="inline-inputs" x-show="showAddPosForm" style="margin-top: 1rem;">
              <input type="text" x-model="newPosCode" placeholder="CODE" class="edit-field" style="width:10em;flex-grow:unset" maxlength="10"/>
              <input type="text" x-model="newPosName" placeholder="NAME" class="edit-field"/>
              <button class="inline-submit-btn" @click="addPartOfSpeech">Add</button>
            </div>
            <div style="color:var(--text-dim); font-size: 0.9em; margin-top: 0.5rem; margin-bottom:1.5rem;">
              <button class="info-button" @click="showAddPosForm = true">+</button> Add part of speech
            </div>

            <h3>Grammar Tables</h3>

            <!-- List view -->
            <!-- <template> -->
              <div>
                <!-- the tables -->
                <div class="table-list" x-show="grammarTables.length > 0">
                  <template x-for="gt in grammarTables" :key="gt.id">
                    <div class="table-view">
                      <span x-text="gt.table_name" style="flex-grow:1"></span>
                      <span class="etymology" x-text="gt.apply_on" x-show="gt.apply_on"></span>

                      <a class="delete-button" :href="'/grammar-table.html?lang=' + selectedLanguage.code + '&id=' + gt.id">edit</a>
                      <button class="delete-button" @click="removeGrammarTable(gt.id)">delete</button>

                      <table class="grammar-table">
                        <thead>
                          <tr>
                            <th></th>
                            <template x-for="col in gt.col_order" :key="col">
                              <th style="min-width:80px;" x-text="col"></th>
                            </template>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="row in gt.row_order" :key="row">
                            <tr>
                              <td style="white-space:nowrap;" x-text="row"></td>
                              <template x-for="col in gt.col_order" :key="col">
                                <td style="min-width:5em;" x-text="(gt.data[row] || {})[col]"></td>
                              </template>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>
                </div>
                <p class="empty" x-show="grammarTables.length === 0" style="text-align:left;padding:0.5rem 0;">No grammar tables defined.</p>

                <div class="inline-inputs" x-show="showAddTableForm" style="margin-top:1rem;">
                  <input type="text" x-model="newTableName" placeholder="TABLE NAME" class="edit-field"/>
                  <input type="text" x-model="newTableApplyOn" placeholder="APPLY ON (POS)" class="edit-field" style="width:13em;flex-grow:unset" maxlength="10"/>
                  <button class="inline-submit-btn" @click="addGrammarTable">Create</button>
                  <button class="inline-submit-btn" @click="showAddTableForm = false; newTableName = ''; newTableApplyOn = ''">Cancel</button>
                </div>
                <div style="color:var(--text-dim); font-size: 0.9em; margin-top: 0.5rem;">
                  <button class="info-button" @click="showAddTableForm = true">+</button> Add grammar table
                </div>
              </div>
            <!-- </template> -->


          </div>


          <h2>Phonology</h2>
          <div class="section-block">
            <div class="section-label">IPA Ruleset <a :href="'/phono/ipa/' + selectedLanguage.code" target="_blank">(Edit)</a></div>
            <template x-if="selectedLanguage.ipa_ruleset">
              <pre class="edit-field" x-text="selectedLanguage.ipa_ruleset"></pre>
            </template>
            <template x-if="!selectedLanguage.ipa_ruleset">
              <p class="empty" style="text-align:left;padding:0;">No IPA ruleset defined.</p>
            </template>
          </div>
        </div>
      </div>
    </template>
  </main>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('languages', () => ({
    // State
    isLoading: true,
    error: '',
    languages: [],
    selectedLanguage: null,
    showAddPosForm: false,
    newPosCode: '',
    newPosName: '',
    // Grammar table state
    grammarTables: [],
    showAddTableForm: false,
    newTableName: '',
    newTableApplyOn: '',
    get pageTitle() {
      if (this.isLoading) return 'Languages';
      return this.selectedLanguage ? 'Language Details' : 'Languages';
    },
    
    // Lifecycle
    async init() {
      // Check URL for code parameter
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      
      if (code) {
        await this.loadLanguageDetail(code);
      } else {
        await this.loadLanguages();
      }
    },
    
    // Methods
    async loadLanguages() {
      this.isLoading = true;
      this.error = '';
      try {
        this.languages = await fetchLanguages();
      } catch (error) {
        console.error('Failed to load languages:', error);
        this.error = 'Failed to load languages.';
      } finally {
        this.isLoading = false;
      }
    },
    
    async loadLanguageDetail(code) {
      this.isLoading = true;
      this.error = '';
      try {
        const lang = await fetchLanguage(code);
        this.selectedLanguage = lang;
        document.title = `${lang.name_en} (${lang.code}) ⋄ Conlexa`;
        await this.loadGrammarTables(lang.code);
      } catch (error) {
        console.error('Failed to load language:', error);
        this.error = `Language "${esc(code)}" not found.`;
        this.selectedLanguage = null;
      } finally {
        this.isLoading = false;
      }
    },
    
    selectLanguage(code) {
      // Update URL without reloading page
      const url = new URL(window.location);
      url.searchParams.set('code', code);
      window.history.pushState({}, '', url);
      this.loadLanguageDetail(code);
    },
    
    goBack() {
      if (this.selectedLanguage) {
        // Clear selected language and show list
        this.selectedLanguage = null;
        this.showAddPosForm = false;
        this.newPosCode = '';
        this.newPosName = '';
        this.grammarTables = [];
        this.showAddTableForm = false;
        
        // Update URL
        const url = new URL(window.location);
        url.searchParams.delete('code');
        window.history.pushState({}, '', url);
        document.title = 'Languages ⋄ Conlexa';
      } else {
        window.location.href = '/';
      }
    },
    
    async addPartOfSpeech() {
      if (!this.selectedLanguage) return;
      
      const code = this.newPosCode.trim().toUpperCase();
      const name_en = this.newPosName.trim();
      
      if (!code || !name_en) {
        alert('Please fill in both code and name.');
        return;
      }
      
      try {
        await createPartOfSpeech(this.selectedLanguage.code, code, name_en);
        // Reload language details
        await this.loadLanguageDetail(this.selectedLanguage.code);
        // Reset form
        this.showAddPosForm = false;
        this.newPosCode = '';
        this.newPosName = '';
      } catch (error) {
        console.error('Failed to add part of speech:', error);
        alert('Failed to add part of speech.');
      }
    },
    
    async deletePartOfSpeech(posCode) {
      if (!this.selectedLanguage) return;

      if (!confirm(`Are you sure you want to delete part of speech "${posCode}"?`)) return;

      try {
        await deletePartOfSpeech(this.selectedLanguage.code, posCode);
        // Reload language details
        await this.loadLanguageDetail(this.selectedLanguage.code);
      } catch (error) {
        console.error('Failed to delete part of speech:', error);
        alert(`Failed to delete part of speech. ${error.message}`);
      }
    },

    // Grammar table methods
    async loadGrammarTables(langCode) {
      try {
        this.grammarTables = await fetchGrammarTables(langCode);
      } catch (e) {
        console.error('Failed to load grammar tables:', e);
        this.grammarTables = [];
      }
    },

    async addGrammarTable() {
      if (!this.selectedLanguage) return;
      const name = this.newTableName.trim();
      if (!name) { alert('Table name is required.'); return; }
      try {
        const gt = await createGrammarTable(this.selectedLanguage.code, {
          table_name: name,
          apply_on: this.newTableApplyOn.trim() || null,
          data: {},
          row_order: [],
          col_order: [],
        });
        window.location.href = `/grammar-table.html?lang=${encodeURIComponent(this.selectedLanguage.code)}&id=${gt.id}`;
      } catch (e) {
        console.error('Failed to create grammar table:', e);
        alert('Failed to create grammar table.');
      }
    },

    async removeGrammarTable(tableId) {
      if (!this.selectedLanguage) return;
      if (!confirm('Delete this grammar table?')) return;
      try {
        await deleteGrammarTable(this.selectedLanguage.code, tableId);
        await this.loadGrammarTables(this.selectedLanguage.code);
      } catch (e) {
        console.error('Failed to delete grammar table:', e);
        alert('Failed to delete grammar table.');
      }
    },
  }));
});
</script>

</body>
</html>
