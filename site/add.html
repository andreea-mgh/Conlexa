<!DOCTYPE html>
<html lang="en" x-data="addWord">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Add Word ⋄ Conlexa</title>
<link rel="stylesheet" href="/style.css"/>
<script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
</head>
<body>

<header>
  <h1><a href="/" class="entry-link">Conlexa</a></h1>
  <span class="subtitle">Dictionary</span>
</header>

<div class="layout">
  <aside>
    <a href="/dictionary" class="reset-btn" style="display:block;text-align:center;text-decoration:none">← Back</a>
  </aside>

  <main>
    <form @submit.prevent="submitForm">
      <div class="filter-group">
        <label>Word</label>
        <input name="word" class="edit-field" type="text" required autofocus x-model="form.word">
      </div>
      <div class="filter-group">
        <label>Native Script</label>
        <input name="word_scripted" class="edit-field" type="text" x-model="form.word_scripted">
      </div>
      <div class="filter-group">
        <label>Part of Speech</label>
        <select name="pos" class="edit-field" x-model="form.pos">
          <option value="">—</option>
          <template x-for="pos in partsOfSpeech" :key="pos.code">
            <option :value="pos.code" x-text="pos.code"></option>
          </template>
        </select>
      </div>
      <div class="filter-group">
        <label>Class</label>
        <input name="class" class="edit-field" type="text" x-model="form.class">
      </div>
      <div class="filter-group">
        <label>Language Code</label>
        <select name="language_code" class="edit-field" x-model="form.language_code" @change="onLanguageChange">
          <option value="">—</option>
          <template x-for="lang in languages" :key="lang">
            <option :value="lang" x-text="lang"></option>
          </template>
        </select>
      </div>
      <div class="filter-group">
        <label>Definition</label>
        <textarea name="def_en" class="edit-field" rows="4" x-model="form.def_en"></textarea>
      </div>
      <div class="filter-group">
        <label>Etymology</label>
        <textarea name="etymology" class="edit-field" rows="3" x-model="form.etymology"></textarea>
      </div>
      <div class="filter-group">
        <label>Example</label>
        <textarea name="example" class="edit-field" rows="2" x-model="form.example"></textarea>
      </div>
      <div class="filter-group">
        <label>Tags (comma-separated)</label>
        <input name="tags" class="edit-field" type="text" x-model="form.tagsRaw">
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
        <button type="submit" class="reset-btn" :disabled="isSubmitting" style="color:var(--accent);border-color:var(--accent-dim)" x-text="submitButtonText"></button>
        <a href="/dictionary" class="reset-btn" style="text-decoration:none;text-align:center">Cancel</a>
      </div>
    </form>
  </main>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('addWord', () => ({
    // State
    languages: [],
    partsOfSpeech: [],
    isSubmitting: false,
    isLoading: true,
    
    // Form data
    form: {
      word: '',
      word_scripted: '',
      pos: '',
      class: '',
      language_code: '',
      def_en: '',
      etymology: '',
      example: '',
      tagsRaw: '',
    },
    
    // Computed
    get submitButtonText() {
      return this.isSubmitting ? 'Adding…' : 'Add word';
    },
    
    // Lifecycle
    async init() {
      await this.loadFilters();
    },
    
    // Methods
    async loadFilters() {
      this.isLoading = true;
      try {
        const data = await fetchFilters();
        this.languages = data.language_codes || [];
      } catch (error) {
        console.error('Failed to load filters:', error);
      } finally {
        this.isLoading = false;
      }
    },
    
    async onLanguageChange() {
      if (!this.form.language_code) {
        this.partsOfSpeech = [];
        return;
      }
      
      try {
        const partsOfSpeech = await fetchPartsOfSpeech(this.form.language_code);
        this.partsOfSpeech = partsOfSpeech;
      } catch (error) {
        console.error('Failed to load parts of speech:', error);
        this.partsOfSpeech = [];
      }
    },
    
    async submitForm() {
      if (this.isSubmitting) return;
      
      this.isSubmitting = true;
      
      try {
        const tags = this.form.tagsRaw.trim() 
          ? this.form.tagsRaw.split(',').map(t => t.trim()).filter(Boolean) 
          : null;
        
        const body = {
          word: this.form.word.trim(),
          word_scripted: this.form.word_scripted.trim() || null,
          pos: this.form.pos || null,
          class: this.form.class.trim() || null,
          language_code: this.form.language_code || null,
          def_en: this.form.def_en.trim() || null,
          etymology: this.form.etymology.trim() || null,
          example: this.form.example.trim() || null,
          tags: tags,
        };
        
        const { id } = await createWord(body);
        window.location.href = `/word/${id}`;
      } catch (error) {
        console.error('Failed to add word:', error);
        alert('Failed to add word. Please try again.');
        this.isSubmitting = false;
      }
    }
  }));
});
</script>

</body>
</html>
