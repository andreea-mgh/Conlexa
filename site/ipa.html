<!DOCTYPE html>
<html lang="en" x-data="ipaRuleset">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPA Ruleset ⋄ Conlexa</title>
<link rel="stylesheet" href="/style.css"/>
<script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
</head>
<body>

<header>
  <h1><a href="/" class="entry-link">Conlexa</a></h1>
  <span class="subtitle" x-text="pageTitle">IPA Ruleset</span>
</header>

<div class="layout">
  <aside>
    <button class="reset-btn" @click="goBack">← Back</button>
  </aside>

  <main id="main" class="main-flex">
    <!-- Loading state -->
    <div class="loading" x-show="isLoading">Loading</div>
    
    <!-- Index view: list of languages -->
    <template x-if="!isLoading && isIndex">
      <div>
        <h2>IPA Rulesets<button class="info-button" @click="openDocs">?</button></h2>
        <template x-for="lang in languages" :key="lang.code">
          <h3 class="page-link">
            <a :href="'/phono/ipa/' + lang.code" x-text="lang.name_en + ' (' + lang.code + ')'"></a>
          </h3>
        </template>
        <div class="empty" x-show="languages.length === 0">No languages found.</div>
      </div>
    </template>
    
    <!-- Edit view: ruleset textarea -->
    <template x-if="!isLoading && !isIndex && language">
      <div style="display: flex; flex-direction: column; height: 100%;">
        <textarea 
          x-model="rulesetText" 
          class="edit-field" 
          spellcheck="false" 
          style="flex:1;min-height:400px"
          placeholder="Enter IPA ruleset..."></textarea>
        <div class="form-actions">
          <button class="reset-btn reset-btn-accent" @click="save" :disabled="isSaving" x-text="saveButtonText"></button>
        </div>
      </div>
    </template>
    
    <!-- Error state -->
    <div class="empty" x-show="!isLoading && error" x-text="error"></div>
  </main>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('ipaRuleset', () => ({
    // State
    isLoading: true,
    isIndex: false,
    languages: [],
    language: null,
    rulesetText: '',
    isSaving: false,
    error: '',
    
    // Computed
    get pageTitle() {
      if (this.isIndex) return 'IPA Rulesets';
      if (this.language) return `IPA Ruleset — ${this.language.code}`;
      return 'IPA Ruleset';
    },
    
    get saveButtonText() {
      if (this.isSaving) return 'Saving…';
      return 'Save';
    },
    
    // Lifecycle
    async init() {
      // Determine if we're on index page or language page
      const pathEnd = window.location.pathname.split('/').filter(Boolean).pop();
      this.isIndex = pathEnd === 'ipa';
      
      if (this.isIndex) {
        await this.loadLanguages();
      } else {
        const langCode = pathEnd.toUpperCase();
        await this.loadLanguage(langCode);
      }
    },
    
    // Methods
    async loadLanguages() {
      this.isLoading = true;
      this.error = '';
      try {
        this.languages = await fetchLanguages();
        document.title = 'IPA Rulesets ⋄ Conlexa';
      } catch (error) {
        console.error('Failed to load languages:', error);
        this.error = 'Failed to load languages.';
      } finally {
        this.isLoading = false;
      }
    },
    
    async loadLanguage(langCode) {
      this.isLoading = true;
      this.error = '';
      try {
        const langData = await fetchLanguage(langCode);
        this.language = langData;
        this.rulesetText = langData.ipa_ruleset || '';
        document.title = `IPA Ruleset: ${langData.code} ⋄ Conlexa`;
      } catch (error) {
        console.error('Failed to load language:', error);
        this.error = 'Language not found.';
      } finally {
        this.isLoading = false;
      }
    },
    
    async save() {
      if (!this.language || this.isSaving) return;
      
      this.isSaving = true;
      try {
        await updateLanguage(this.language.code, { ipa_ruleset: this.rulesetText });
        // Show success feedback
        const originalText = this.saveButtonText;
        // Temporarily show "Saved"
        setTimeout(() => {
          this.isSaving = false;
        }, 1500);
      } catch (error) {
        console.error('Save failed:', error);
        alert('Save failed. Please try again.');
        this.isSaving = false;
      }
    },
    
    goBack() {
      if (this.isIndex) {
        window.location.href = '/';
      } else {
        window.location.href = '/phono/ipa';
      }
    },
    
    openDocs() {
      window.open('/ipa_doc.html', '_blank');
    }
  }));
});
</script>

</body>
</html>
